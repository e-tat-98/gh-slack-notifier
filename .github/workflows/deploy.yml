name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write  # OIDC 認証に必要
  contents: read

jobs:
  deploy:
    name: AWS CDK Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. ソースコードのチェックアウト
      - name: Checkout code
      - uses: actions/checkout@v4

      # 2. Node.js のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. 依存関係のインストール
      - name: Install dependencies
        run: npm ci

      # 4. サーバーのビルド
      - name: Nitro ビルド
        run: pnpm build

      # 5. AWS 認証情報の取得 (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # 5. CDK Deploy の実行
      - name: CDK Deploy
        working-directory: apps/cdk
        run: |
          npx cdk deploy --require-approval never
