name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 依存パッケージのインストール
        run: pnpm install --frozen-lockfile

      - name: リンター実行
        run: pnpm lint

      - name: テスト実行
        run: pnpm test

      - name: ビルド確認
        run: pnpm build

  deploy:
    name: AWS CDK Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 依存パッケージのインストール
        run: pnpm install --frozen-lockfile

      - name: Nitro ビルド
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: CDK Deploy
        working-directory: apps/cdk
        run: |
          npx cdk deploy --require-approval never
