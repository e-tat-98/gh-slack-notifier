name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: 依存パッケージのインストール
        run: pnpm install --frozen-lockfile

      - name: リンター実行
        run: pnpm lint

      - name: テスト実行
        run: pnpm test

      - name: ビルド確認
        run: pnpm build
